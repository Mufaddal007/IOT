<!DOCTYPE html>
<html>
	<head>
		<title>IOT control panel</title>
		<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
		<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}"/>
		<script src="{{ url_for('static', filename='js/app.js')}}"></script>
	</head>
	<body>
		<div class="container">
			<h1>IOT control panel</h1>
			<div class="card section led-row">
				<div>
					<p>LED State: <span id="ledState">Loading...</span></p>
				</div>
				<button onclick="toggleLed()">Toggle LED</button>
			</div>
			<div class="card section">
				<div>
					<h3>Create Schedule</h3>
					<input id="label" type="text" placeholder="label (e.g. Morning light)" />
					
					<div class="form-row">
						<select id="device">
							<option value="led">LED</option>
							<option value="pump">Pump</option>
						</select>
						<input type="time" id="from_time"/>
						<input type="time" id="to_time" />
						
						<input type="text" id="days" placeholder="MON,TUE"/>
						<button onclick="createSchedule()">Add</button>
					</div>
					<div class="table-container">
						<h3>Schedules</h3>
						<table class="schedule-table">
							<thead>
								<tr>
									<th>Label</th>
									<th>Device</th>
									<th>From</th>
									<th>To</th>
									<th>Days</th>
									<th>Status</th>
									<th>Actions</th>
								</tr>
							</thead>
							<tbody id="scheduleTable"></tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
